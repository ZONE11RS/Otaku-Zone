<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - عالم الأنمي العربي</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0a10'/%3E%3Ctext x='50' y='40' font-family='Arial Black' font-size='28' font-weight='900' fill='%23e63946' text-anchor='middle' dominant-baseline='middle'%3EOZ%3C/text%3E%3Ctext x='50' y='72' font-family='Arial' font-size='12' fill='%23888' text-anchor='middle'%3Eアニメ%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ===== THEME VARIABLES ===== */
        :root {
            --bg-primary: #050508;
            --bg-secondary: #0c0c12;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a25;
            --bg-modal: #0a0a10;
            --accent: #e63946;
            --accent-glow: #ff1a2e;
            --accent-dark: #b91c28;
            --gold: #ffd700;
            --gold-dim: #c4a000;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --border: #1e1e2e;
            --border-accent: #2a2a3e;
            --telegram: #0088cc;
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ebebef;
            --bg-card: #ffffff;
            --bg-card-hover: #f0f0f5;
            --bg-modal: #ffffff;
            --accent: #e63946;
            --text-primary: #111118;
            --text-secondary: #55556a;
            --text-muted: #9090a8;
            --border: #dcdce8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Noto Kufi Arabic', sans-serif;
            direction: rtl;
            transition: background-color 0.3s ease;
        }

        /* Navbar & Hero Styles (مختصرة للحفاظ على الحجم) */
        #navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; transition: 0.4s; padding: 10px 16px; background: rgba(5,5,8,0.8); backdrop-filter: blur(10px); }
        .nav-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
        .nav-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .nav-logo-icon { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; }
        
        #hero { padding: 120px 20px 60px; text-align: center; background: radial-gradient(circle at top, #1a0d0e, var(--bg-primary)); }
        .hero-title { font-size: 3rem; font-weight: 900; margin-bottom: 20px; }
        .text-gradient { background: linear-gradient(135deg, var(--accent), #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Anime Grid */
        #anime-section { padding: 40px 20px; max-width: 1280px; margin: 0 auto; }
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .anime-card { background: var(--bg-card); border-radius: 15px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid var(--border); }
        .anime-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .anime-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
        .anime-card-info { padding: 10px; }
        .anime-card-title { font-size: 13px; font-weight: 700; height: 38px; overflow: hidden; }

        /* Modal & Player */
        #anime-modal { position: fixed; inset: 0; z-index: 200; display: none; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); overflow-y: auto; padding: 20px 10px; }
        #anime-modal.open { display: block; }
        .modal-card { max-width: 1000px; margin: 0 auto; background: var(--bg-modal); border-radius: 20px; overflow: hidden; position: relative; border: 1px solid var(--border); }
        .modal-close { position: absolute; top: 15px; left: 15px; background: var(--accent); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 10; }
        
        .player-container { width: 100%; background: #000; display: none; }
        .player-container.active { display: block; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* Quick Nav Buttons (ميزة التنقل الجديدة) */
        #quick-nav { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); }
        .nav-btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; transition: 0.2s; }
        .nav-btn-next { background: var(--accent); color: white; }
        .nav-btn-prev { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--border); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .modal-body { padding: 25px; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 10px; margin-top: 20px; }
        .episode-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .episode-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

        #loading-screen { position: fixed; inset: 0; background: var(--bg-primary); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { width: 50px; height: 50px; border: 5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <p style="margin-top: 20px;">جاري تجهيز عالمك الخاص...</p>
</div>

<nav id="navbar">
    <div class="nav-inner">
        <div class="nav-logo">
            <div class="nav-logo-icon">OZ</div>
            <h1 style="font-size: 1.2rem;"><span class="text-gradient">OTAKU</span> ZONE</h1>
        </div>
        <div class="nav-actions">
            <a href="https://t.me/OtakuZoen" class="nav-btn-next nav-btn" style="text-decoration: none;">تيليجرام</a>
        </div>
    </div>
</nav>

<section id="hero">
    <h1 class="hero-title">عالم <span class="text-gradient">الأنمي</span> بين يديك</h1>
    <p style="color: var(--text-secondary);">شاهد أحدث الحلقات المترجمة بجودة عالية وتجربة مشاهدة فريدة.</p>
</section>

<section id="anime-section">
    <h2 style="margin-bottom: 20px;">🎬 قائمة الأنمي المتاحة</h2>
    <div id="anime-grid" class="anime-grid"></div>
</section>

<div id="anime-modal">
    <div class="modal-card">
        <button class="modal-close" onclick="closeModal()">✕</button>
        
        <div id="modal-player" class="player-container">
            <div class="video-wrapper">
                <iframe id="main-iframe" src="" allowfullscreen></iframe>
            </div>
            <div id="quick-nav">
                <button id="prev-ep-btn" class="nav-btn nav-btn-prev">◄ الحلقة السابقة</button>
                <span id="current-ep-label" style="font-weight: 800; color: var(--accent);"></span>
                <button id="next-ep-btn" class="nav-btn nav-btn-next">الحلقة التالية ►</button>
            </div>
        </div>

        <div class="modal-body">
            <h1 id="modal-title" class="text-gradient"></h1>
            <p id="modal-desc" style="margin: 15px 0; color: var(--text-secondary); font-size: 14px; line-height: 1.7;"></p>
            <h3>الحلقات</h3>
            <div id="episodes-list" class="episodes-grid"></div>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://bdzbajkpaqkujbkvrjfu.supabase.co";
    const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let allData = {};
    let currentEpisodes = [];

    async function init() {
        try {
            // جلب البيانات من Supabase
            const { data: episodes, error } = await _supabase.from('episodes').select('*');
            if (error) throw error;

            const groups = {};
            episodes.forEach(e => {
                if (!groups[e.mal_id]) groups[e.mal_id] = [];
                groups[e.mal_id].push(e);
            });

            const animeGrid = document.getElementById('anime-grid');
            const malIds = Object.keys(groups);

            for (const id of malIds) {
                const res = await fetch(`https://api.jikan.moe/v4/anime/${id}`);
                const { data: anime } = await res.json();
                
                allData[id] = { anime, episodes: groups[id].sort((a,b) => a.episode_number - b.episode_number) };

                const card = document.createElement('div');
                card.className = 'anime-card';
                card.onclick = () => openModal(id);
                card.innerHTML = `
                    <img src="${anime.images.jpg.image_url}" alt="${anime.title}">
                    <div class="anime-card-info">
                        <div class="anime-card-title">${anime.title}</div>
                    </div>
                `;
                animeGrid.appendChild(card);
            }
            document.getElementById('loading-screen').style.display = 'none';
        } catch (e) { console.error(e); }
    }

    function openModal(id) {
        const data = allData[id];
        currentEpisodes = data.episodes;
        
        document.getElementById('modal-title').textContent = data.anime.title;
        document.getElementById('modal-desc').textContent = data.anime.synopsis;
        
        const epList = document.getElementById('episodes-list');
        epList.innerHTML = '';
        
        currentEpisodes.forEach((ep, index) => {
            const btn = document.createElement('button');
            btn.className = 'episode-btn';
            btn.id = `ep-btn-${ep.episode_number}`;
            btn.textContent = ep.episode_number;
            btn.onclick = () => playEpisode(index);
            epList.appendChild(btn);
        });

        document.getElementById('anime-modal').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function playEpisode(index) {
        const ep = currentEpisodes[index];
        const iframe = document.getElementById('main-iframe');
        const player = document.getElementById('modal-player');
        
        player.classList.add('active');
        iframe.src = ep.video_url;

        // تحديث أزرار القائمة
        document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`ep-btn-${ep.episode_number}`).classList.add('active');

        // تحديث شريط التنقل (التالي والسابق)
        const prevBtn = document.getElementById('prev-ep-btn');
        const nextBtn = document.getElementById('next-ep-btn');
        const label = document.getElementById('current-ep-label');

        label.textContent = `الحلقة ${ep.episode_number}`;

        // إعداد زر "السابق"
        if (index > 0) {
            prevBtn.disabled = false;
            prevBtn.onclick = () => playEpisode(index - 1);
        } else {
            prevBtn.disabled = true;
        }

        // إعداد زر "التالي"
        if (index < currentEpisodes.length - 1) {
            nextBtn.disabled = false;
            nextBtn.onclick = () => playEpisode(index + 1);
        } else {
            nextBtn.disabled = true;
        }

        document.getElementById('anime-modal').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function closeModal() {
        document.getElementById('anime-modal').classList.remove('open');
        document.getElementById('main-iframe').src = '';
        document.getElementById('modal-player').classList.remove('active');
        document.body.style.overflow = '';
    }

    init();
</script>

</body>
    </html>
