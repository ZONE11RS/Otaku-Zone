<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otaku Zone - عالم الأنمي العربي</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0a10'/%3E%3Ctext x='50' y='40' font-family='Arial Black' font-size='28' font-weight='900' fill='%23e63946' text-anchor='middle' dominant-baseline='middle'%3EOZ%3C/text%3E%3Ctext x='50' y='72' font-family='Arial' font-size='12' fill='%23888' text-anchor='middle'%3Eアニメ%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-primary: #050508;
            --bg-secondary: #0c0c12;
            --bg-card: #12121a;
            --bg-card-hover: #1a1a25;
            --bg-modal: #0a0a10;
            --accent: #e63946;
            --accent-glow: #ff1a2e;
            --accent-dark: #b91c28;
            --gold: #ffd700;
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #55556a;
            --border: #1e1e2e;
            --telegram: #0088cc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Noto Kufi Arabic', sans-serif;
            direction: rtl;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .shimmer-bg { background: linear-gradient(90deg, transparent 0%, rgba(230,57,70,0.06) 50%, transparent 100%); background-size: 200% 100%; animation: shimmer 2.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* ===== NAVBAR (RESPONSIVE) ===== */
        #navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; transition: all 0.4s ease; background: transparent; }
        #navbar.scrolled { background: rgba(5,5,8,0.92); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-inner { max-width: 1400px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 72px; }
        .nav-logo { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .nav-logo-icon { width: 44px; height: 44px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-weight: 900; color: white; }
        .nav-search { flex: 1; max-width: 500px; margin: 0 32px; position: relative; }
        .nav-search input { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 10px 42px 10px 16px; color: white; outline: none; transition: 0.3s; }
        .nav-search input:focus { border-color: var(--accent); }

        @media (max-width: 768px) {
            .nav-search { display: none; }
            .nav-inner { height: 60px; padding: 0 16px; }
        }

        /* ===== HERO ===== */
        #hero { padding-top: 120px; padding-bottom: 60px; position: relative; text-align: center; }
        .hero-title { font-size: clamp(32px, 5vw, 64px); font-weight: 900; line-height: 1.2; }
        .text-gradient { background: linear-gradient(135deg, #e63946, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* ===== ANIME GRID (THE FLEXIBLE PART) ===== */
        .section-inner { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }
        @media (max-width: 640px) {
            .anime-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }

        .anime-card { cursor: pointer; transition: 0.3s; }
        .anime-card:hover { transform: translateY(-10px); }
        .anime-card-inner { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; position: relative; }
        .anime-card-img { position: relative; aspect-ratio: 3/4; }
        .anime-card-img img { width: 100%; height: 100%; object-fit: cover; }
        .score-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: var(--gold); padding: 4px 8px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        .anime-card-info { padding: 12px; }
        .anime-card-title { font-size: 14px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* ===== MODAL (ORIGINAL FEATURES) ===== */
        #anime-modal { position: fixed; inset: 0; z-index: 200; display: none; align-items: flex-start; justify-content: center; overflow-y: auto; background: rgba(0,0,0,0.95); backdrop-filter: blur(4px); padding: 20px; }
        #anime-modal.open { display: flex; }
        .modal-card { width: 100%; max-width: 1100px; background: var(--bg-modal); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; position: relative; animation: fadeInUp 0.4s ease; }
        .modal-close { position: absolute; top: 15px; left: 15px; z-index: 10; background: var(--bg-card); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 50%; cursor: pointer; }

        .modal-body { padding: 30px; display: flex; flex-direction: column; gap: 30px; }
        @media (min-width: 768px) { .modal-body { flex-direction: row; } }
        .modal-poster { width: 100%; max-width: 280px; flex-shrink: 0; }
        .modal-poster img { width: 100%; border-radius: 16px; border: 1px solid var(--border); }
        .modal-main { flex: 1; }

        .modal-tabs { display: flex; gap: 10px; margin: 20px 0; overflow-x: auto; padding-bottom: 10px; }
        .modal-tab-btn { padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; color: var(--text-secondary); cursor: pointer; white-space: nowrap; }
        .modal-tab-btn.active { background: var(--accent); color: white; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn 0.3s; }

        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 20px; }
        .episode-btn { padding: 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; color: white; cursor: pointer; text-align: center; }
        .episode-btn.active { background: var(--accent); }

        .modal-player { display: none; width: 100%; aspect-ratio: 16/9; background: #000; margin-bottom: 20px; }
        .modal-player.active { display: block; }
        
        /* ===== LOADING SCREEN ===== */
        #loading-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.6s; }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }
        .spinner { width: 50px; height: 50px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s infinite linear; }
    </style>
</head>
<body>

<div id="loading-screen"><div class="spinner"></div><p style="margin-top:20px;">جاري تحميل عالم الأنمي...</p></div>

<nav id="navbar">
    <div class="nav-inner">
        <div class="nav-logo" onclick="window.scrollTo({top:0,behavior:'smooth'})">
            <div class="nav-logo-icon">OZ</div>
            <h1 style="margin-right:10px; font-size:20px;"><span class="text-gradient">OTAKU</span> ZONE</h1>
        </div>
        <div class="nav-search">
            <input type="text" id="desktop-search" placeholder="ابحث عن أنمي..." oninput="filterAnime(this.value)">
        </div>
        <a href="https://t.me/OtakuZoen" target="_blank" style="text-decoration:none; color:var(--telegram); font-weight:bold;">تيليجرام</a>
    </div>
</nav>

<section id="hero">
    <h1 class="hero-title"><span class="text-gradient">عالم الأنمي</span> بين يديك</h1>
    <p style="color:var(--text-secondary); margin-top:10px;">شاهد أفضل المسلسلات مترجمة بجودة عالية</p>
</section>

<section class="section-inner">
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:30px;">
        <div style="width:5px; height:35px; background:var(--accent); border-radius:5px;"></div>
        <h2 id="anime-count">قائمة الأنمي</h2>
    </div>
    <div id="anime-grid-container">
        </div>
</section>

<div id="anime-modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-card">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-player" id="modal-player">
            <iframe id="player-iframe" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
        </div>
        <div class="modal-body">
            <div class="modal-poster">
                <img id="modal-poster-img" src="" alt="">
                <div style="margin-top:15px; padding:15px; background:var(--bg-card); border-radius:12px;">
                    <p id="modal-status" style="font-size:13px; color:var(--text-secondary);"></p>
                    <p id="modal-score" style="color:var(--gold); font-weight:bold; margin-top:5px;"></p>
                </div>
            </div>
            <div class="modal-main">
                <h1 id="modal-title" class="text-gradient"></h1>
                <p id="modal-sub" style="color:var(--text-muted); margin-bottom:15px;"></p>
                
                <div class="modal-tabs">
                    <button class="modal-tab-btn active" onclick="switchTab(event,'tab-story')">القصة والحلقات</button>
                    <button class="modal-tab-btn" onclick="switchTab(event,'tab-info')">معلومات إضافية</button>
                </div>

                <div id="tab-story" class="tab-panel active">
                    <p id="modal-story" style="line-height:1.8; color:var(--text-secondary);"></p>
                    <h3 style="margin-top:25px; border-right:3px solid var(--accent); padding-right:10px;">الحلقات المتوفرة:</h3>
                    <div id="episodes-display" class="episodes-grid"></div>
                </div>
                
                <div id="tab-info" class="tab-panel">
                    <div id="modal-extra-info" style="color:var(--text-secondary);"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// الإعدادات
const SB_URL = "https://bdzbajkpaqkujbkvrjfu.supabase.co";
const SB_KEY = "sb_publishable_gwkBiDaTv8jYG4IHFITCLA__zBnhS8r";
const _supabase = supabase.createClient(SB_URL, SB_KEY);

let allAnimeData = {};
let searchQuery = '';

// التحميل الأولي
async function init() {
    try {
        const { data: episodes, error } = await _supabase.from('episodes').select('*');
        if (error) throw error;

        const groups = {};
        episodes.forEach(e => {
            if (!groups[e.mal_id]) groups[e.mal_id] = [];
            groups[e.mal_id].push(e);
        });

        const malIds = Object.keys(groups);
        for (let i = 0; i < malIds.length; i++) {
            const res = await fetch(`https://api.jikan.moe/v4/anime/${malIds[i]}`);
            const { data } = await res.json();
            allAnimeData[malIds[i]] = { anime: data, episodes: groups[malIds[i]] };
            renderGrid();
            if (i === 0) document.getElementById('loading-screen').classList.add('hidden');
            await new Promise(r => setTimeout(r, 400));
        }
    } catch (err) {
        console.error(err);
        document.getElementById('loading-screen').classList.add('hidden');
    }
}

function renderGrid() {
    const container = document.getElementById('anime-grid-container');
    const filtered = Object.values(allAnimeData).filter(d => 
        d.anime.title.toLowerCase().includes(searchQuery)
    );

    document.getElementById('anime-count').textContent = `تم العثور على ${filtered.length} أنمي`;

    let html = '<div class="anime-grid">';
    filtered.forEach(d => {
        const a = d.anime;
        html += `
            <div class="anime-card" onclick="openModal(${a.mal_id})">
                <div class="anime-card-inner">
                    <div class="anime-card-img">
                        <img src="${a.images.jpg.large_image_url}" loading="lazy">
                        <div class="score-badge">⭐ ${a.score || 'N/A'}</div>
                    </div>
                    <div class="anime-card-info">
                        <div class="anime-card-title">${a.title}</div>
                    </div>
                </div>
            </div>`;
    });
    html += '</div>';
    container.innerHTML = html;
}

async function translateText(text) {
    try {
        const r = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=ar&dt=t&q=${encodeURIComponent(text)}`);
        const d = await r.json();
        return d[0].map(s => s[0]).join('');
    } catch { return text; }
}

async function openModal(id) {
    const data = allAnimeData[id];
    const a = data.anime;
    
    document.getElementById('anime-modal').classList.add('open');
    document.body.style.overflow = 'hidden';
    
    document.getElementById('modal-poster-img').src = a.images.jpg.large_image_url;
    document.getElementById('modal-title').textContent = a.title;
    document.getElementById('modal-sub').textContent = a.title_japanese;
    document.getElementById('modal-score').textContent = `التقييم: ⭐ ${a.score}`;
    
    // تفريغ البيانات السابقة وتحميل الجديدة
    document.getElementById('modal-story').textContent = "جاري ترجمة القصة...";
    document.getElementById('episodes-display').innerHTML = "";
    
    const arStory = await translateText(a.synopsis);
    document.getElementById('modal-story').textContent = arStory;
    document.getElementById('modal-status').textContent = `الحالة: ${await translateText(a.status)}`;

    // عرض الحلقات
    document.getElementById('episodes-display').innerHTML = data.episodes.map(e => `
        <div class="episode-btn" onclick="playEp('${e.video_url}', this)">${e.episode_number}</div>
    `).join('');
}

function playEp(url, btn) {
    document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('modal-player').classList.add('active');
    document.getElementById('player-iframe').src = url;
}

function closeModal() {
    document.getElementById('anime-modal').classList.remove('open');
    document.body.style.overflow = '';
    document.getElementById('player-iframe').src = '';
    document.getElementById('modal-player').classList.remove('active');
}

function switchTab(e, id) {
    document.querySelectorAll('.modal-tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    e.currentTarget.classList.add('active');
    document.getElementById(id).classList.add('active');
}

function filterAnime(val) {
    searchQuery = val.toLowerCase();
    renderGrid();
}

window.addEventListener('scroll', () => {
    const nav = document.getElementById('navbar');
    if (window.scrollY > 50) nav.classList.add('scrolled');
    else nav.classList.remove('scrolled');
});

init();
</script>
</body>
</html>
